name: Test Bot

on:
	# push:
	# 	branches: [main]
	workflow_dispatch:

jobs:
	run-bot:
		runs-on: ubuntu-latest
		environment: dev

		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Set up Python
				uses: actions/setup-python@v5
				with:
					python-version: '3.11'

			- name: Install dependencies
				run: pip install -r requirements.txt

			- name: Run bot
				run: timeout 600 python bot.py || true
